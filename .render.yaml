services:
  - type: web
    name: opelss
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --workers 4 --bind 0.0.0.0:$PORT"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: ""
      - key: SECRET_KEY
        value: ""
      - key: MAIL_SERVER
        value: ""
      - key: MAIL_PORT
        value: ""
      - key: MAIL_USE_TLS
        value: ""
      - key: MAIL_USERNAME
        value: ""
      - key: MAIL_PASSWORD
        value: ""
      - key: OPELSS_ADMIN_EMAIL
        value: ""
